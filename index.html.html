<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Beauty - متجر التجميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .product-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-gray-50">
    <header class="gradient-bg text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-spa text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Glow Beauty</h1>
                        <p class="text-xs opacity-90">جمالك يبدأ من هنا</p>
                    </div>
                </div>
                <button onclick="toggleCart()" class="relative bg-white text-purple-600 px-4 py-2 rounded-full">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </div>
    </header>
    <section class="gradient-bg text-white py-20 text-center">
        <div class="container mx-auto px-4">
            <h2 class="text-5xl font-bold mb-4">اكتشفي جمالك الطبيعي</h2>
            <p class="text-xl mb-8">منتجات تجميل وعناية مختارة بعناية لبشرتك</p>
            <a href="#products" class="bg-white text-purple-600 px-8 py-3 rounded-full font-bold inline-block">تسوقي الآن</a>
        </div>
    </section>
    <section id="products" class="py-16">
        <div class="container mx-auto px-4">
            <h3 class="text-4xl font-bold text-center mb-12">منتجاتنا المميزة</h3>
            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>
    <div id="cartSidebar" class="fixed left-0 top-0 h-full w-96 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 z-50">
        <div class="p-6 h-full flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">سلة التسوق</h3>
                <button onclick="toggleCart()"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="cartItems" class="flex-1 overflow-y-auto mb-4"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between mb-4 text-xl font-bold">
                    <span>المجموع:</span>
                    <span id="cartTotal">0 د.ج</span>
                </div>
                <button onclick="checkout()" class="w-full gradient-bg text-white py-3 rounded-lg font-bold">إتمام الطلب عبر واتساب</button>
            </div>
        </div>
    <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>
    <footer class="bg-gray-800 text-white py-8 mt-16 text-center">
        <p>© 2026 Glow Beauty. جميع الحقوق محفوظة</p>
    </footer>
    <script>
        const products = [
            { id: 1, name: 'سيروم فيتامين C', price: 3500, img: 'https://images.unsplash.com/photo-1608248543803-ba4f8c70ae0b?w=500', desc: 'لتفتيح وتوحيد لون البشرة' },
            { id: 2, name: 'كريم ترطيب بالهيالورونيك', price: 2800, img: 'https://images.unsplash.com/photo-1571781926291-c0028b3a2be2?w=500', desc: 'ترطيب عميق يدوم 24 ساعة' },
            { id: 3, name: 'غسول الوجه بالشاي الأخضر', price: 1800, img: 'https://images.unsplash.com/photo-1556228720-195a6720d03f?w=500', desc: 'تنظيف لطيف للبشرة الحساسة' },
            { id: 4, name: 'ماسك الطين الوردي', price: 2200, img: 'https://images.unsplash.com/photo-1598440947619-2c35ae9aa28c?w=500', desc: 'لتنقية المسام وإزالة الشوائب' },
            { id: 5, name: 'زيت الأرغان للشعر', price: 3200, img: 'https://images.unsplash.com/photo-1608248543803-ba4f8c70ae0b?w=500', desc: 'لشعر لامع وناعم كالحرير' },
            { id: 6, name: 'أحمر شفاه مطفي', price: 1500, img: 'https://images.unsplash.com/photo-1586495777744-4413f21062fa?w=500', desc: 'ثابت يدوم طوال اليوم' }
        ];
        let cart = [];
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-2xl shadow-lg overflow-hidden transition-all duration-300">
                    <img src="${p.img}" alt="${p.name}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h4 class="text-xl font-bold mb-2">${p.name}</h4>
                        <p class="text-gray-600 text-sm mb-4">${p.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold text-purple-600">${p.price} د.ج</span>
                            <button onclick="addToCart(${p.id})" class="gradient-bg text-white px-6 py-2 rounded-full">أضيفي للسلة</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const item = cart.find(i => i.id === id);
            if (item) { item.qty++; } else { cart.push({ ...product, qty: 1 }); }
            updateCart(); toggleCart();
        }
        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-center text-gray-500 mt-10">السلة فارغة</p>';
                cartCount.classList.add('hidden');
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="flex gap-4 mb-4 pb-4 border-b">
                        <img src="${item.img}" class="w-20 h-20 object-cover rounded-lg">
                        <div class="flex-1">
                            <h5 class="font-bold text-sm">${item.name}</h5>
                            <p class="text-purple-600 font-bold">${item.price} د.ج</p>
                            <div class="flex items-center gap-2 mt-2">
                                <button onclick="changeQty(${item.id}, -1)" class="bg-gray-200 w-6 h-6 rounded">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)" class="bg-gray-200 w-6 h-6 rounded">+</button>
                                <button onclick="removeItem(${item.id})" class="mr-auto text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
                cartCount.textContent = cart.reduce((sum, i) => sum + i.qty, 0);
                cartCount.classList.remove('hidden');
            }
            cartTotal.textContent = cart.reduce((sum, i) => sum + i.price * i.qty, 0) + ' د.ج';
        }
        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty <= 0) removeItem(id);
            updateCart();
        }
        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }
        function checkout() {
            if (cart.length === 0) return alert('السلة فارغة');
            let msg = 'مرحبا Glow Beauty 🌸%0Aأريد طلب:%0A%0A';
            cart.forEach(i => { msg += `• ${i.name} - الكمية: ${i.qty} - ${i.price * i.qty} د.ج%0A`; });
            msg += `%0Aالمجموع: ${cart.reduce((s,i) => s + i.price*i.qty, 0)} د.ج`;
            window.open(`https://wa.me/213?text=${msg}`, '_blank');
        }
        renderProducts(); updateCart();
    </script>
</body>
</html>
